name: Deploy a GitHub Pages

on:
  # Publica en cada push a main
  push:
    branches: [main]
  # ...y permite lanzarlo a mano desde la pestaña Actions
  workflow_dispatch:

# Permisos mínimos que necesita el despliegue a Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un solo despliegue a la vez; no cancela el que esté en curso
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      # Vite sirve bajo el subpath /<repo>/ en Pages: pasamos --base con el
      # nombre del repositorio para no hardcodearlo (npm anexa el flag a `vite build`)
      - name: Build de producción
        run: npm run build -- --base="/${{ github.event.repository.name }}/"

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto (dist/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
