<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="theme-color" content="#0E5E6F" />
    <meta name="description" content="Picada — planifica tu jornada de pesca: viento, olas, mareas y luna combinados en una valoración inteligente." />
    <title>Picada — planifica tu pesca</title>
    <script>
      // Fija el tema antes del primer pintado para evitar parpadeo (FOUC).
      try {
        var stored = JSON.parse(localStorage.getItem('picada.v1.theme'))
        var isDark =
          stored === 'dark' ||
          ((!stored || stored === 'system') &&
            window.matchMedia('(prefers-color-scheme: dark)').matches)
        document.documentElement.dataset.theme = isDark ? 'dark' : 'light'
      } catch (e) {
        /* localStorage no disponible: se queda en claro */
      }
    </script>
  </body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
